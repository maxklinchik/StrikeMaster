<!DOCTYPE html>
<html lang="en" data-ui="cartoon">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rankings - Strike Master</title>
  <link rel="icon" type="image/png" href="../../assets/images/BowlingPinCartoon.png">
  <link rel="stylesheet" type="text/css" href="../../assets/css/stored-colors.css">
  <link rel="stylesheet" type="text/css" href="../../assets/css/cartoon-ui.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="../../assets/js/config/teams.js"></script>
  <script src="../../assets/js/accent-loader.js"></script>
  <script src="../../assets/js/logo-loader.js"></script>
  <script src="../../assets/js/season-context.js"></script>
  <script src="../../assets/js/config/api.js"></script>
  <script src="../../assets/js/auth-helper.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
    }

    .navbar {
      background: var(--main-color);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar .logo img {
      height: 46px;
      width: 46px;
      object-fit: contain;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-links {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-links a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }

    .nav-links a:hover { background: rgba(255,255,255,0.1); }
    .nav-links a.active { background: var(--accent-color); color: var(--accent-text-color, white); }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .page-header {
      text-align: left;
      padding: 8px 0 24px;
    }

    .page-header h1 {
      color: var(--text-color);
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 16px;
      margin: 0;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border-color);
    }

    .tab-btn {
      padding: 12px 24px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s ease;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab-btn:hover {
      color: var(--text-color);
    }

    .tab-btn.active {
      color: var(--accent-color);
      border-bottom-color: var(--accent-color);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Rankings Grid */
    .rankings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 900px) {
      .rankings-grid {
        grid-template-columns: 1fr;
      }
    }

    .ranking-block {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .ranking-block-header {
      background: var(--accent-color);
      color: var(--accent-text-color, white);
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
    }

    .ranking-block-content {
      padding: 20px;
    }

    .ranking-section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent-color);
      margin: 20px 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border-color);
    }

    .ranking-section-title:first-child {
      margin-top: 0;
    }

    /* Tables */
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .ranking-table th,
    .ranking-table td {
      padding: 10px 8px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .ranking-table th {
      background: var(--content-bg);
      color: var(--text-color);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ranking-table tbody tr:hover {
      background: var(--content-bg);
    }

    .ranking-table td:first-child {
      width: 50px;
      text-align: center;
      font-weight: 600;
      color: var(--accent-color);
    }

    .rank-1 { color: #FFD700; font-weight: 700; }
    .rank-2 { color: #C0C0C0; font-weight: 700; }
    .rank-3 { color: #CD7F32; font-weight: 700; }

    .filter-controls {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-group label {
      font-weight: 600;
      font-size: 13px;
    }

    .filter-group select {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--content-bg);
      color: var(--text-color);
      font-size: 13px;
      font-family: inherit;
    }

    .footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      color: var(--text-color);
      opacity: 0.6;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .no-data {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Medal badges */
    .medal {
      display: inline-block;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      text-align: center;
      line-height: 24px;
      font-weight: 700;
      font-size: 12px;
      margin-right: 6px;
    }

    .medal-gold { background: #FFD700; color: #000; }
    .medal-silver { background: #C0C0C0; color: #000; }
    .medal-bronze { background: #CD7F32; color: white; }
  </style>
</head>
<body class="dashboard">
  <div class="navbar">
    <div class="nav-left">
      <a href="../../index.html" class="logo">
        <img id="navLogo" src="../../assets/images/Team Logos/phLogo.png" alt="School logo">
      </a>
    </div>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="players.html">Players</a>
      <a href="myTeam.html">My Team</a>
      <a href="announcements.html">Announcements</a>
      <a href="rankings.html" class="active">Rankings</a>
      <a href="../settings/appearanceSettings.html">Settings</a>
    </div>
  </div>

  <div class="container">
    <div class="page-header">
      <h1>Rankings</h1>
      <p>County and division rankings for boys and girls teams and players</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="county">County Rankings</button>
      <button class="tab-btn" data-tab="division">Division Rankings</button>
    </div>

    <!-- COUNTY RANKINGS TAB -->
    <div id="countyTab" class="tab-content active">
      <div class="filter-controls">
        <div class="filter-group">
          <label for="countySeasonSelect">Season:</label>
          <select id="countySeasonSelect">
            <option value="2025-2026">2025-2026</option>
            <option value="2024-2025">2024-2025</option>
          </select>
        </div>
      </div>

      <div class="rankings-grid">
        <!-- Boys County Rankings -->
        <div class="ranking-block">
          <div class="ranking-block-header">Boys County Rankings</div>
          <div class="ranking-block-content" id="countyBoysContent">
            <div class="loading">Loading...</div>
          </div>
        </div>

        <!-- Girls County Rankings -->
        <div class="ranking-block">
          <div class="ranking-block-header">Girls County Rankings</div>
          <div class="ranking-block-content" id="countyGirlsContent">
            <div class="loading">Loading...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- DIVISION RANKINGS TAB -->
    <div id="divisionTab" class="tab-content">
      <div class="filter-controls">
        <div class="filter-group">
          <label for="divisionSeasonSelect">Season:</label>
          <select id="divisionSeasonSelect">
            <option value="2025-2026">2025-2026</option>
            <option value="2024-2025">2024-2025</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="divisionFilter">Division:</label>
          <select id="divisionFilter">
            <option value="">All Divisions</option>
            <option value="north">North</option>
            <option value="south">South</option>
            <option value="east">East</option>
            <option value="west">West</option>
          </select>
        </div>
      </div>

      <div class="rankings-grid">
        <!-- Boys Division Rankings -->
        <div class="ranking-block">
          <div class="ranking-block-header">Boys Division Rankings</div>
          <div class="ranking-block-content" id="divisionBoysContent">
            <div class="loading">Loading...</div>
          </div>
        </div>

        <!-- Girls Division Rankings -->
        <div class="ranking-block">
          <div class="ranking-block-header">Girls Division Rankings</div>
          <div class="ranking-block-content" id="divisionGirlsContent">
            <div class="loading">Loading...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>&copy; 2025 Strike Master | Rankings</p>
  </div>

  <script>
    // Require authentication
    if (!auth.requireAuth('../auth/login.html')) {
      throw new Error('Not authenticated');
    }

    // Load team logo based on user's school affiliation
    function loadTeamLogo() {
      try {
        const userStr = localStorage.getItem('bowling_user');
        if (userStr) {
          const user = JSON.parse(userStr);
          if (user.team_name && typeof getTeamLogo === 'function') {
            const logoPath = getTeamLogo(user.team_name, '../../assets/images/Team Logos/');
            if (logoPath) {
              document.getElementById('navLogo').src = logoPath;
            }
          }
        }
      } catch (e) {
        console.log('Team logo loading not available:', e.message);
      }
    }

    loadTeamLogo();

    let allPlayers = [];
    let allMatches = [];
    let countySeasonSelect = document.getElementById('countySeasonSelect');
    let divisionSeasonSelect = document.getElementById('divisionSeasonSelect');
    let divisionFilter = document.getElementById('divisionFilter');

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabName = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabName + 'Tab').classList.add('active');
      });
    });

    // Load data
    async function loadRankingsData(season) {
      try {
        const currentUser = auth.getUser();
        // In a real app, this would fetch from the API
        // For now, we'll use mock data
        await loadCountyRankings(season);
        await loadDivisionRankings(season);
      } catch (error) {
        console.error('Error loading rankings:', error);
      }
    }

    function getMedalClass(rank) {
      if (rank === 1) return 'medal medal-gold';
      if (rank === 2) return 'medal medal-silver';
      if (rank === 3) return 'medal medal-bronze';
      return '';
    }

          { rank: 3, name: 'Liam Carter', team: 'County Central HS', average: 182 },
          { rank: 4, name: 'Noah Patel', team: 'Ridge Valley HS', average: 180 },
        ];
        
        const countyBoysTeams = [
          { rank: 1, name: 'Strike Master HS', wins: 15, average: 178 },

        const countyGirlsPlayers = [
          { rank: 1, name: 'Samantha Lee', team: 'Strike Master HS', average: 195 },
          { rank: 2, name: 'Emily Davis', team: 'Strike Master HS', average: 188 },
          { rank: 3, name: 'Ava Martinez', team: 'County West HS', average: 186 },
          { rank: 4, name: 'Chloe Nguyen', team: 'Eastview HS', average: 181 },
        ];
        
        const countyGirlsTeams = [
          { rank: 1, name: 'Strike Master HS', wins: 14, average: 180 },
          { rank: 2, name: 'County West HS', wins: 11, average: 170 },
          { rank: 3, name: 'Eastview HS', wins: 10, average: 169 },
          { rank: 4, name: 'Southridge HS', wins: 9, average: 166 },
        ];

        // Render boys county
        document.getElementById('countyBoysContent').innerHTML = `
          <div class="ranking-section-title">Top Players</div>
          <table class="ranking-table">
            <thead>
              <tr><th>Rank</th><th>Player</th><th>Team</th><th style="text-align: right;">Avg</th></tr>
            </thead>
            <tbody>
              ${countyBoysPlayers.map(p => `
                <tr>
                  <td><span class="${getMedalClass(p.rank)}"></span>${p.rank}</td>
                  <td>${p.name}</td>
                  <td>${p.team}</td>
                  <td style="text-align: right;">${p.average}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div class="ranking-section-title">Top Teams</div>

              ${countyBoysTeams.map(t => `

                  <td><span class="${getMedalClass(t.rank)}"></span>${t.rank}</td>

                  <td style="text-align: right;">${t.average}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;

        // Render girls county
        document.getElementById('countyGirlsContent').innerHTML = `
          <div class="ranking-section-title">Top Players</div>
          <table class="ranking-table">
            <thead>
              <tr><th>Rank</th><th>Player</th><th>Team</th><th style="text-align: right;">Avg</th></tr>
            </thead>
            <tbody>
              ${countyGirlsPlayers.map(p => `
                <tr>
                  <td><span class="${getMedalClass(p.rank)}"></span>${p.rank}</td>
                  <td>${p.name}</td>
                  <td>${p.team}</td>
                  <td style="text-align: right;">${p.average}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div class="ranking-section-title">Top Teams</div>
          <table class="ranking-table">
            <thead>
              <tr><th>Rank</th><th>Team</th><th style="text-align: center;">Wins</th><th style="text-align: right;">Avg</th></tr>
            </thead>
            <tbody>
              ${countyGirlsTeams.map(t => `
                <tr>
                  <td><span class="${getMedalClass(t.rank)}"></span>${t.rank}</td>
                  <td>${t.name}</td>
                  <td style="text-align: center;">${t.wins}</td>
                  <td style="text-align: right;">${t.average}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (error) {
        console.error('Error loading county rankings:', error);
        document.getElementById('countyBoysContent').innerHTML = '<div class="no-data">Error loading rankings</div>';
        document.getElementById('countyGirlsContent').innerHTML = '<div class="no-data">Error loading rankings</div>';
      }
    }

      try {
        // Mock data for division rankings
        const divisionBoysPlayers = [
          { rank: 1, name: 'Alex Johnson', team: 'Strike Master HS', division: 'North', average: 192 },

          { rank: 4, name: 'Noah Patel', team: 'Ridge Valley HS', division: 'East', average: 181 },
        ];
        
        const divisionBoysTeams = [
          { rank: 1, name: 'Strike Master HS', division: 'North', wins: 16, average: 179 },
          { rank: 2, name: 'County Central HS', division: 'South', wins: 13, average: 174 },
          { rank: 3, name: 'Ridge Valley HS', division: 'East', wins: 12, average: 171 },
          { rank: 4, name: 'Westbrook HS', division: 'West', wins: 11, average: 169 },
        ];
        
        const divisionGirlsPlayers = [
          { rank: 1, name: 'Samantha Lee', team: 'Strike Master HS', division: 'North', average: 196 },
          { rank: 2, name: 'Emily Davis', team: 'Strike Master HS', division: 'North', average: 189 },
          { rank: 3, name: 'Ava Martinez', team: 'County West HS', division: 'West', average: 185 },
          { rank: 4, name: 'Chloe Nguyen', team: 'Eastview HS', division: 'East', average: 182 },
        ];
        
        const divisionGirlsTeams = [
          { rank: 1, name: 'Strike Master HS', division: 'North', wins: 15, average: 181 },
          { rank: 2, name: 'County West HS', division: 'West', wins: 12, average: 173 },
          { rank: 3, name: 'Eastview HS', division: 'East', wins: 11, average: 171 },
          { rank: 4, name: 'Southridge HS', division: 'South', wins: 10, average: 168 },
        ];

        // Render boys division
        document.getElementById('divisionBoysContent').innerHTML = `
          <div class="ranking-section-title">Top Players</div>
          <table class="ranking-table">
            <thead>
              <tr><th>Rank</th><th>Player</th><th>Team</th><th>Division</th><th style="text-align: right;">Avg</th></tr>
            </thead>
            <tbody>
              ${divisionBoysPlayers.map(p => `
                <tr>
                  <td><span class="${getMedalClass(p.rank)}"></span>${p.rank}</td>
                  <td>${p.name}</td>
                  <td>${p.team}</td>

                  <td style="text-align: right;">${p.average}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          <div class="ranking-section-title">Top Teams</div>
          <table class="ranking-table">
            <thead>
              <tr><th>Rank</th><th>Team</th><th>Division</th><th style="text-align: center;">Wins</th><th style="text-align: right;">Avg</th></tr>
            </thead>
            <tbody>
              ${divisionBoysTeams.map(t => `
                <tr>
                  <td><span class="${getMedalClass(t.rank)}"></span>${t.rank}</td>

                  <td><strong>${t.division}</strong></td>

                </tr>
              `).join('')}
            </tbody>
          </table>
        `;

        // Render girls division
        document.getElementById('divisionGirlsContent').innerHTML = `
          <div class="ranking-section-title">Top Players</div>
          <table class="ranking-table">

              <tr><th>Rank</th><th>Player</th><th>Team</th><th>Division</th><th style="text-align: right;">Avg</th></tr>
            </thead>
            <tbody>
              ${divisionGirlsPlayers.map(p => `
                <tr>
                  <td><span class="${getMedalClass(p.rank)}"></span>${p.rank}</td>
                  <td>${p.name}</td>
                  <td>${p.team}</td>

              `).join('')}
            </tbody>
          </table>
          <div class="ranking-section-title">Top Teams</div>
          <table class="ranking-table">
            <thead>
              <tr><th>Rank</th><th>Team</th><th>Division</th><th style="text-align: center;">Wins</th><th style="text-align: right;">Avg</th></tr>
            </thead>
            <tbody>
              ${divisionGirlsTeams.map(t => `
                <tr>
                  <td><span class="${getMedalClass(t.rank)}"></span>${t.rank}</td>

        document.getElementById('divisionBoysContent').innerHTML = '<div class="no-data">Error loading rankings</div>';

    // Event listeners
    countySeasonSelect.addEventListener('change', (e) => {
      loadCountyRankings(e.target.value);
    });

    divisionSeasonSelect.addEventListener('change', (e) => {
      loadDivisionRankings(e.target.value);
    });

    // Initialize
    loadRankingsData('2025-2026');
  </script>
</body>
</html>
